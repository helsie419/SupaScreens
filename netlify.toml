
[[redirects]]
  from = "/products"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/contac-us"
  to = "/contact.html"
  status = 301
  force = true

[[redirects]]
  from = "/contac-us/"
  to = "/contact.html"
  status = 301
  force = true

[[redirects]]
  from = "/wp-json/*"
  to = "/"
  status = 404

[[redirects]]
  from = "/xmlrpc.php"
  to = "/"
  status = 404

[[redirects]]
  from = "/feed/*"
  to = "/"
  status = 301

[[redirects]]
  from = "/comments/*"
  to = "/"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "upgrade-insecure-requests"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/Images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
